AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Location Sharing API - SAM backend for real-time location sharing

Parameters:
  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 Client ID

  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth 2.0 Client Secret

  CallbackURL:
    Type: String
    Default: myapp://auth/callback
    Description: OAuth callback URL for the mobile app

  LogoutURL:
    Type: String
    Default: myapp://auth/logout
    Description: OAuth logout URL for the mobile app

  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment name

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  # ──────────────────────────────────────────────
  # Cognito User Pool
  # ──────────────────────────────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "location-sharing-${EnvironmentName}-user-pool"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: "1"

  # ──────────────────────────────────────────────
  # Google Identity Provider
  # ──────────────────────────────────────────────
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email
        name: name

  # ──────────────────────────────────────────────
  # Cognito User Pool Client (public, no secret)
  # ──────────────────────────────────────────────
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: GoogleIdentityProvider
    Properties:
      ClientName: !Sub "location-sharing-${EnvironmentName}-app-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - Google
        - COGNITO
      CallbackURLs:
        - !Ref CallbackURL
      LogoutURLs:
        - !Ref LogoutURL
      PreventUserExistenceErrors: ENABLED

  # ──────────────────────────────────────────────
  # Cognito Hosted UI Domain
  # ──────────────────────────────────────────────
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "location-sharing-${EnvironmentName}-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  # ──────────────────────────────────────────────
  # HTTP API (API Gateway v2)
  # ──────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref EnvironmentName
      Description: !Sub "Location Sharing API - ${EnvironmentName}"
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            AuthorizationScopes:
              - openid
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  # ──────────────────────────────────────────────
  # JWT Authorizer (externalized for cross-resource reference)
  # ──────────────────────────────────────────────
#  CognitoJwtAuthorizer:
#    Type: AWS::ApiGatewayV2::Authorizer
#    Properties:
#      ApiId: !Ref HttpApi
#      AuthorizerType: JWT
#      Name: DirectCognitoJwtAuthorizer
#      IdentitySource:
#        - $request.header.Authorization
#      JwtConfiguration:
#        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
#        Audience:
#          - !Ref UserPoolClient

  # ──────────────────────────────────────────────
  # API to SQS Direct Integration
  # ──────────────────────────────────────────────
  ApiToSqsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiToSqsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt LocationQueue.Arn

#  LocationQueueIntegration:
#    Type: AWS::ApiGatewayV2::Integration
#    Properties:
#      ApiId: !Ref HttpApi
#      IntegrationType: AWS_PROXY
#      IntegrationSubtype: SQS-SendMessage
#      CredentialsArn: !GetAtt ApiToSqsRole.Arn
#      PayloadFormatVersion: "1.0"
#      RequestParameters:
#        QueueUrl: !Ref LocationQueue
#        MessageBody: $request.body
#        MessageGroupId: $context.authorizer.jwt.claims.sub
#        MessageDeduplicationId: $context.requestId

#  PostLocationRoute:
#    Type: AWS::ApiGatewayV2::Route
#    Properties:
#      ApiId: !Ref HttpApi
#      RouteKey: "POST /location"
#      Target: !Sub "integrations/${LocationQueueIntegration}"
#      AuthorizationType: JWT
#      AuthorizerId: !Ref CognitoJwtAuthorizer

  # ──────────────────────────────────────────────
  # Lambda Functions
  # ──────────────────────────────────────────────
  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/health.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-health"
      Handler: health.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET

  ListFriendsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/friends/list-friends.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-list-friends"
      Handler: friends/list-friends.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
          USER_PROFILE_TABLE_NAME: !Ref UserProfileTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SocialGraphTable
        - DynamoDBReadPolicy:
            TableName: !Ref UserProfileTable
      Events:
        GetFriends:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends
            Method: GET

  GetFriendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/friends/get-friend.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-get-friend"
      Handler: friends/get-friend.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
          USER_PROFILE_TABLE_NAME: !Ref UserProfileTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SocialGraphTable
        - DynamoDBReadPolicy:
            TableName: !Ref UserProfileTable
      Events:
        GetFriends:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends/{id}
            Method: GET

  AddFriendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/friends/add-friend.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-add-friend"
      Handler: friends/add-friend.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetFriends:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends
            Method: POST

  UpdateFriendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/friends/update-friend.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-update-friend"
      Handler: friends/update-friend.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetFriends:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends/{id}
            Method: PATCH

  RemoveFriendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/friends/remove-friend.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-remove-friend"
      Handler: friends/remove-friend.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetFriends:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends/{id}
            Method: DELETE

  ProcessLocationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/process-location.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-process-location"
      Handler: process-location.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          LOCATION_TABLE_NAME: !Ref LocationDataTable
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref LocationDataTable
      Events:
        ProcessLocation:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /location
            Method: POST

  GetProfileFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-profile.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-get-profile"
      Handler: get-profile.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          LOCATION_TABLE_NAME: !Ref LocationDataTable
          GOOGLE_CONFIG_PARAMETER_NAME: !Sub "/location-sharing-app/${EnvironmentName}/google-config"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LocationDataTable
        - SSMParameterReadPolicy:
            ParameterName: !Sub "location-sharing-app/${EnvironmentName}/google-config"
      Events:
        GetProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /profile
            Method: GET

  ListGroupsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/list-groups.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-list-groups"
      Handler: groups/list-groups.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups
            Method: GET

  GetGroupFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/get-group.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-get-group"
      Handler: groups/get-group.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups/{id}
            Method: GET

  UpdateGroupFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/update-group.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-update-group"
      Handler: groups/update-group.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups/{id}
            Method: PATCH

  CreateGroupFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/create-group.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-create-group"
      Handler: groups/create-group.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups
            Method: POST

  RemoveGroupFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/remove-group.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-remove-group"
      Handler: groups/remove-group.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups/{id}
            Method: DELETE

  AddGroupMemberFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/add-group-member.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-add-group-member"
      Handler: groups/add-group-member.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        AddMemberToGroup:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups/{groupId}/members/{memberId}
            Method: PUT
        AddGroupForMember:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends/{memberId}/groups/{groupId}
            Method: PUT

  RemoveGroupMemberFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/groups/remove-group-member.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-remove-group-member"
      Handler: groups/remove-group-member.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          SOCIAL_GRAPH_TABLE_NAME: !Ref SocialGraphTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        RemoveMemberToGroup:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /groups/{groupId}/members/{memberId}
            Method: DELETE
        RemoveGroupForMember:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /friends/{memberId}/groups/{groupId}
            Method: DELETE

  PostConfirmationHookFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - src/handlers/user-profile-post-confirmation-hook.ts
    Properties:
      FunctionName: !Sub "location-sharing-${EnvironmentName}-user-profile-post-confirmation-hook"
      Handler: user-profile-post-confirmation-hook.handler
      CodeUri: .
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          USER_PROFILE_TABLE_NAME: !Ref UserProfileTable
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref UserProfileTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SocialGraphTable
      Events:
        PostConfirmation:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation

  # ──────────────────────────────────────────────
  # SQS Queue
  # ──────────────────────────────────────────────
  LocationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "location-sharing-${EnvironmentName}-location-queue.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true

  # ──────────────────────────────────────────────
  # DynamoDB Tables
  # ──────────────────────────────────────────────
  LocationDataTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: LocationData
      PrimaryKey:
        Name: userId
        Type: String

  SocialGraphTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SocialGraph
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sortKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sortKey
          KeyType: RANGE

  UserProfileTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserProfile
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UsernameIndex
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  CognitoDomain:
    Description: Cognito Hosted UI Domain URL
    Value: !Sub "https://location-sharing-${EnvironmentName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"

  JwksIssuerUrl:
    Description: JWKS Issuer URL for JWT validation
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  HttpApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}"
